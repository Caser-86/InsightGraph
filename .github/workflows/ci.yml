name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Coverage Report
        if: always()
        run: python -m coverage report --fail-under=85

      - name: Generate Coverage Badge
        if: always()
        run: python -m coverage html
        run: insight-graph-smoke --help

      - name: Generate Eval Reports
        run: |
          mkdir -p reports
          insight-graph-eval --case-file docs/evals/default.json --output reports/eval.json
          insight-graph-eval --case-file docs/evals/default.json --markdown --output reports/eval.md
          python scripts/summarize_eval_report.py reports/eval.json > reports/eval-summary.json
          python scripts/summarize_eval_report.py reports/eval.json --markdown > reports/eval-summary.md
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/append_eval_history.py --summary reports/eval-summary.json --history reports/eval-history.json --markdown reports/eval-history.md --run-id "$GITHUB_RUN_ID" --head-sha "$GITHUB_SHA" --created-at "$created_at" --limit 50

      - name: Eval Gate
        run: insight-graph-eval --case-file docs/evals/default.json --min-score 85 --fail-on-case-failure

      - name: Upload Eval Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eval-reports
          path: |
            reports/eval.json
            reports/eval.md
            reports/eval-summary.json
            reports/eval-summary.md
            reports/eval-history.json
            reports/eval-history.md

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: htmlcov/
