name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Generate Eval Reports
        run: |
          mkdir -p reports
          insight-graph-eval --case-file docs/evals/default.json --output reports/eval.json
          insight-graph-eval --case-file docs/evals/default.json --markdown --output reports/eval.md

      - name: Eval Gate
        run: insight-graph-eval --case-file docs/evals/default.json --min-score 85 --fail-on-case-failure

      - name: Upload Eval Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: eval-reports
          path: reports/eval.*
